  <style>
    :root { --ink:#14202b; --muted:#607080; --paper:#f7f2e8; }

    .tile-fill { position:absolute; bottom:0; left:0; right:0; height:0%; background:linear-gradient(to top,rgba(255,255,255,.06),rgba(255,255,255,.2)), color-mix(in srgb,var(--c) 78%,white); z-index:0; pointer-events:none; }

    .score-badge { min-width:28px; height:18px; display:grid; place-items:center; border-radius:3px; font:900 10px/1 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; color:white; }
    .score-badge.s0 { background:#dc3545; } .score-badge.s1 { background:#e67e22; } .score-badge.s2 { background:#f1c40f; color:var(--ink); } .score-badge.s3 { background:#27ae60; } .score-badge.s4 { background:#2ecc71; }

    footer { position:relative; z-index:1; margin-top:24px; display:flex; justify-content:space-between; align-items:center; font:700 14px/1.3 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; color:var(--muted); border-top:2px solid rgba(20,32,43,.16); padding-top:16px; }

  <script>
    const data = {"families": {"Voice Delivery": "#18a56a", "Pace & Rhythm": "#1f7fd1", "Pauses & Silence": "#7b61d1", "Fluency": "#00a7b5", "Language Quality": "#f28c28", "Answer Structure": "#e14949", "Specificity": "#d9a900", "Reasoning": "#d94b86", "Conversation Behavior": "#159b8d", "Confidence Signals": "#4758c8", "Role Competency": "#8a633d", "Recording Quality": "#7c8894"}, "signals": [{"code": "Vol", "name": "Volume", "category": "Voice Delivery", "layer": "M", "score": 4, "evidence": "RMS=0.0633"}, {"code": "Var", "name": "Vocal Variety", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "The candidate shows minimal vocal variety with predominantly flat delivery. While there are occasional moments of slight emphasis when discussing interests like UI/UX design, the overall pattern is monotonous with frequent hesitations, repetitions, and language switching that disrupts natural flow and expression. The delivery lacks the dynamic variation needed to engage listeners or emphasize key points effectively."}, {"code": "Ste", "name": "Steadiness", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "Frequent instability across all dimensions - volume drops mid-sentence, erratic pacing with sudden stops and starts, tone shifts unpredictably, and speech becomes increasingly fragmented and difficult to follow, particularly in later answers where sentences trail off incomplete."}, {"code": "Ton", "name": "Tone", "category": "Voice Delivery", "layer": "J", "score": 1, "evidence": "Candidate displays significant nervousness with frequent stuttering, incomplete sentences, code-switching between English and Hindi, and fragmented thoughts. Speech patterns are hesitant with multiple false starts and unclear articulation that would negatively impact listener perception of voice quality and overall communication effectiveness."}, {"code": "Prj", "name": "Projection", "category": "Voice Delivery", "layer": "D", "score": 3, "evidence": "RMS=0.0633"}, {"code": "En", "name": "Energy", "category": "Voice Delivery", "layer": "J", "score": 2, "evidence": "Shows moderate engagement with enthusiasm for technical topics like UI/UX design and data analytics, but energy is inconsistent across answers. Communication struggles and frequent language switching suggest nervousness rather than disengagement. Demonstrates passion for projects but delivery lacks consistent vitality."}, {"code": "Clr", "name": "Clarity", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "Many words are hard to understand due to frequent grammatical errors, incomplete sentences, code-switching between English and Hindi, repetitive stammering, and unclear articulation. While some basic meaning can be extracted with significant effort, the overall communication is heavily impaired."}, {"code": "Mon", "name": "Monotony", "category": "Voice Delivery", "layer": "D", "score": 1, "evidence": "Speech shows mostly flat delivery with repetitive patterns, frequent filler words ('I am', 'so I choose that'), and mechanical sentence structures. While there are occasional attempts at emphasis, the overall pattern is monotonous with limited natural variation in rhythm or intonation."}, {"code": "WPM", "name": "Words Per Minute", "category": "Pace & Rhythm", "layer": "M", "score": 2, "evidence": "Avg WPM=161.6"}, {"code": "Acc", "name": "Acceleration", "category": "Pace & Rhythm", "layer": "M", "score": 0, "evidence": "Avg accel=12.7 WPM"}, {"code": "Dec", "name": "Deceleration", "category": "Pace & Rhythm", "layer": "M", "score": 2, "evidence": "Avg decel=-12.7 WPM"}, {"code": "Rus", "name": "Rushing", "category": "Pace & Rhythm", "layer": "D", "score": 1, "evidence": "Avg WPM=161.6"}, {"code": "Drg", "name": "Dragging", "category": "Pace & Rhythm", "layer": "D", "score": 4, "evidence": "Avg WPM=161.6"}, {"code": "Pac", "name": "Pace Control", "category": "Pace & Rhythm", "layer": "D", "score": 1, "evidence": "Avg WPM=161.6"}, {"code": "Rhy", "name": "Rhythm", "category": "Pace & Rhythm", "layer": "D", "score": 2, "evidence": "Spread=41.2"}, {"code": "FP", "name": "Filled Pause", "category": "Pauses & Silence", "layer": "M", "score": 4, "evidence": "Fillers=3"}, {"code": "HP", "name": "Hesitation Pause", "category": "Pauses & Silence", "layer": "M+D", "score": 1, "evidence": "HP count=3"}, {"code": "Lat", "name": "Latency", "category": "Pauses & Silence", "layer": "M", "score": 2, "evidence": "Avg=1.94s"}, {"code": "Sil", "name": "Long Silence", "category": "Pauses & Silence", "layer": "M", "score": 4, "evidence": "Long pauses=0"}, {"code": "OP", "name": "Owned Pause", "category": "Pauses & Silence", "layer": "D", "score": 2, "evidence": "Owned=2"}, {"code": "RP", "name": "Recovery Pause", "category": "Pauses & Silence", "layer": "D", "score": 1, "evidence": "Recovery is rare and weak. Most pauses lead to repetitive stammering, incomplete thoughts, or language switching rather than meaningful recovery. The candidate struggles to resume coherently after pausing, with frequent false starts and fragmented sentences that don't improve answer quality."}, {"code": "Pau", "name": "Pause Quality", "category": "Pauses & Silence", "layer": "D", "score": 1, "evidence": "While pause frequency is low, the candidate shows significant speech disruption through repetitive false starts, incomplete thoughts, and language switching mid-sentence. The pauses appear to be moments of struggle rather than deliberate communication tools, indicating poor fluency control."}, {"code": "FS", "name": "False Starts", "category": "Fluency", "layer": "M", "score": 3, "evidence": "FS=6"}, {"code": "Rep", "name": "Repetition", "category": "Fluency", "layer": "M", "score": 3, "evidence": "Repeats=7"}, {"code": "SC", "name": "Self-Correct", "category": "Fluency", "layer": "M+D", "score": 4, "evidence": "Corrections=1"}, {"code": "Run", "name": "Run-On Speech", "category": "Fluency", "layer": "D", "score": 4, "evidence": "Run-on turns=0"}, {"code": "Frag", "name": "Fragments", "category": "Fluency", "layer": "M+D", "score": 4, "evidence": "Fragments=2"}, {"code": "Flo", "name": "Speech Flow", "category": "Fluency", "layer": "D", "score": 1, "evidence": "Speech shows frequent breakdowns with multiple false starts ('I am I am design'), adjacent repeats ('attract attract', 'creative creatively'), language switching mid-sentence, and incomplete thoughts. The disruption rate of 1.4/100 words combined with observable pattern of stops and restarts indicates frequent interruption to natural flow."}, {"code": "Coh", "name": "Cohesion", "category": "Fluency", "layer": "D+J", "score": 1, "evidence": "Ideas are mostly presented as disconnected lists with minimal logical flow. Frequent repetition, incomplete thoughts, and abrupt topic shifts create weak connections between sentences. The low connector usage (1.0/100w) reflects the fragmented nature of responses where ideas don't build cohesively upon each other."}, {"code": "Conn", "name": "Connector Words", "category": "Fluency", "layer": "M+J", "score": 2, "evidence": "Basic=51"}, {"code": "Grm", "name": "Grammar", "category": "Language Quality", "layer": "D+J", "score": 1, "evidence": "Frequent grammatical errors including incomplete sentences, incorrect verb forms, word order issues, and code-switching to Hindi significantly impair comprehension. While some meaning can be extracted, the errors create substantial strain for the listener and often obscure the intended message."}, {"code": "Ten", "name": "Tense", "category": "Language Quality", "layer": "M+J", "score": 1, "evidence": "Frequent tense errors throughout with inconsistent use of present/past tenses, incomplete sentences, and grammatical confusion that significantly impacts clarity. While some meaning can be extracted, the tense inaccuracies create substantial communication barriers."}, {"code": "SVA", "name": "Agreement", "category": "Language Quality", "layer": "M+J", "score": 1, "evidence": "Frequent subject-verb agreement errors throughout, including 'I am pursuing...campus' (missing preposition), 'there is very creative design model creating', 'its UI UX is very interesting', 'I genuinely work' (tense inconsistency), 'they they have not a battery', and many others. While some sentences are grammatically correct, the errors are pervasive and often impede clear communication."}, {"code": "Sent", "name": "Sentence", "category": "Language Quality", "layer": "D+J", "score": 1, "evidence": "Frequent broken sentences, incomplete thoughts, code-switching between English and Hindi, grammatical errors, and fragmented ideas. While some basic meaning can be extracted, the sentence structures are consistently flawed and difficult to follow."}, {"code": "Voc", "name": "Vocabulary", "category": "Language Quality", "layer": "D+J", "score": 1, "evidence": "Very limited vocabulary range with frequent repetition of basic words like 'I am', 'very', 'choose', 'work'. Speech contains numerous grammatical errors, incomplete sentences, code-switching to Hindi, and imprecise word usage (e.g., 'compute' instead of 'complete'). The unique word ratio of 0.35 indicates significant repetition, and technical terms are used incorrectly or incompletely."}, {"code": "Reg", "name": "Register", "category": "Language Quality", "layer": "J", "score": 0, "evidence": "Language is clearly inappropriate for interview context with severe issues: frequent code-switching between English and Hindi, incomplete sentences, grammatical errors, unclear communication, and inability to articulate thoughts coherently. The candidate struggles to maintain professional English throughout and fails to communicate ideas effectively."}, {"code": "Tech", "name": "Technical", "category": "Language Quality", "layer": "J", "score": 1, "evidence": "Uses some technical terms like 'UI UX', 'Power BI', 'SQL', 'data analytics', and 'solar energy' but application is often incorrect or unclear. Terms are mentioned without proper context or explanation, and there are frequent grammatical errors that obscure meaning. Technical vocabulary appears forced rather than natural, with limited understanding demonstrated."}, {"code": "Idi", "name": "Idioms", "category": "Language Quality", "layer": "J", "score": 1, "evidence": "Very limited natural phrasing with frequent grammatical errors, code-switching to Hindi, incomplete sentences, and awkward constructions like 'I am design I am like to design' and 'I will compute in the certain time.' While some basic ideas are communicated, the language lacks idiomatic fluency and professional control."}, {"code": "RepW", "name": "Word Repeat", "category": "Language Quality", "layer": "M", "score": 0, "evidence": "Repeat words=269"}, {"code": "Pwr", "name": "Power Words", "category": "Language Quality", "layer": "J", "score": 1, "evidence": "Language is predominantly generic and repetitive with frequent filler words ('very', 'also', 'so'), basic vocabulary, and lacks precision. Multiple incomplete sentences, code-switching, and vague expressions like 'technical things' and 'certain time' demonstrate weak word choice. No evidence of strong action verbs or emphasis-aware language."}, {"code": "Gap", "name": "Working Around Gaps", "category": "Language Quality", "layer": "D+J", "score": 1, "evidence": "The candidate frequently encounters vocabulary gaps that cause communication breakdowns. While they attempt to work around missing words (e.g., describing UI/UX as 'creative design model creating'), their explanations often become unclear or incomplete. Code-switching to Hindi and incomplete sentences indicate they struggle to find alternative ways to express ideas in English, resulting in repeated communication failures."}, {"code": "Str", "name": "Structure", "category": "Answer Structure", "layer": "D+J", "score": 1, "evidence": "Answers lack coherent structure with frequent false starts, incomplete thoughts, and language switching mid-sentence. Ideas are scattered without logical flow or clear organization, making responses difficult to follow despite containing some relevant content."}, {"code": "Ctx", "name": "Context", "category": "Answer Structure", "layer": "J", "score": 2, "evidence": "Candidate mentions some real contexts like 'Blood Bank Management System' project, 'University College of Engineering Tiruchirappalli', 'Rila three-day entrepreneurship program', and 'Power BI using SQL' work experience. However, these contexts lack clear details about specific roles, tasks, or verifiable information that would make them precise and actionable for follow-up questions."}, {"code": "Act", "name": "Action", "category": "Answer Structure", "layer": "J", "score": 2, "evidence": "Candidate mentions several personal actions (pursuing degree, working part-time in data analytics, studying aptitude, improving communication skills, finishing mini project) but descriptions are broad and lack specific details about methodology, outcomes, or clear ownership of results."}, {"code": "Res", "name": "Result", "category": "Answer Structure", "layer": "J", "score": 1, "evidence": "The candidate mentions some outcomes like completing a mini project in blood bank management system and part-time work in data analytics, but these are stated vaguely without specific details, metrics, or clear impact. Most responses focus on interests and ongoing activities rather than concrete results achieved."}, {"code": "Ex", "name": "Example", "category": "Answer Structure", "layer": "J", "score": 1, "evidence": "The candidate mentions a few specific items like 'blood bank management system mini project' and 'Power BI using SQL' but provides no concrete details, context, or outcomes. The examples are vague, poorly articulated, and fail to demonstrate competencies or achievements meaningfully."}, {"code": "STAR", "name": "STAR", "category": "Answer Structure", "layer": "C", "score": 1, "evidence": "All responses are general introductory statements about background, interests, and current activities. No specific behavioral examples with clear situations, tasks, actions taken, or measurable results are provided. The candidate mentions projects like 'blood bank management system' and 'data analytics work' but doesn't structure these as complete STAR examples with context, challenges, specific actions, and outcomes."}, {"code": "Rel", "name": "Relevance", "category": "Answer Structure", "layer": "J", "score": 1, "evidence": "Answers are loosely related but consistently miss the specific asks. Candidate mentions relevant topics (UI/UX, data analytics) but doesn't directly address questions about 5-year goals, degree enjoyment specifics, or what they'd build with unlimited resources. Communication issues and tangential responses prevent clear, focused answers."}, {"code": "Drf", "name": "Drift", "category": "Answer Structure", "layer": "J", "score": 1, "evidence": "Frequent drift throughout. A1 switches languages mid-answer, A4 completely shifts from degree enjoyment to entrepreneurship programs, A5 introduces new technical area (data analytics) when asked about UI/UX, and A6 entirely ignores the 'what would you build' question to discuss interview skills. Only A2 and A3 stay somewhat on topic."}, {"code": "Ver", "name": "Verifiable", "category": "Specificity", "layer": "J", "score": 2, "evidence": "Contains some verifiable elements like specific institution (University College of Engineering Tiruchirappalli), degree program (Computer Science Engineering), technical skills (Power BI, SQL), and project mention (Blood Bank Management System), but lacks concrete details like dates, company names, specific achievements, or measurable outcomes that would make verification straightforward."}, {"code": "Step", "name": "Steps", "category": "Specificity", "layer": "J", "score": 1, "evidence": "The candidate mentions scattered activities (Power BI, SQL, studying aptitude, improving communication) but provides no clear sequence or systematic process for any task. Responses lack coherent step-by-step thinking and are fragmented with language mixing issues."}, {"code": "Num", "name": "Numbers", "category": "Specificity", "layer": "M+J", "score": 1, "evidence": "Contains only vague quantities like '11th and 12th', 'three days', 'one hour' without meaningful metrics, dates, or impact measurements that would demonstrate concrete achievements or experience"}, {"code": "Nam", "name": "Names", "category": "Specificity", "layer": "M+J", "score": 2, "evidence": "Candidate mentions some specific names including educational institutions, a project (Blood Bank Management System), and technical tools (Power BI, SQL). However, many references are vague ('three day program', 'entrepreneurship program', 'one new company') and there are inconsistencies in institution names. The named entities provide some concrete details but lack the specificity and consistency needed for higher scores."}, {"code": "Det", "name": "Detail", "category": "Specificity", "layer": "J", "score": 1, "evidence": "Answers contain vague, fragmented details with poor language structure. While some specific elements are mentioned (Power BI, SQL, blood bank management system), they lack context and depth. Most responses are unclear, repetitive, and don't provide meaningful insight into the candidate's actual experience or capabilities."}, {"code": "Con", "name": "Concrete", "category": "Specificity", "layer": "J", "score": 1, "evidence": "The candidate's language is mostly vague and abstract with minimal concrete details. While they mention a few specific items like 'Blood Bank Management System', 'Power BI', 'SQL', and 'three day program', these are overshadowed by numerous vague phrases like 'very creative design model', 'very interesting and creativity', 'genuinely work on', and 'unlimited time'. The communication is also fragmented with frequent language switching and unclear expressions, making it difficult to extract concrete information about their actual experience and capabilities."}, {"code": "Why", "name": "Reasoning", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "Candidate provides weak, circular reasoning with statements like 'I choose UI UX because it's creative and interesting' without explaining why creativity matters to them or how it connects to their goals. Reasoning is repetitive, lacks depth, and doesn't demonstrate clear decision-making processes or insights into their choices."}, {"code": "C&E", "name": "Cause/Effect", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "Candidate shows sequence of events (chose CS → chose UI/UX, experienced Power BI → interested in data analytics) but lacks clear explanatory connections between actions and outcomes. Most statements are descriptive rather than demonstrating causal understanding of how specific actions led to specific results."}, {"code": "Opt", "name": "Options", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "Candidate states their choices (UI/UX, computer science, data analytics) but doesn't mention considering any alternative options or explain why they chose these over other possibilities. They simply state what they selected without demonstrating awareness of other paths they could have taken."}, {"code": "Trd", "name": "Tradeoffs", "category": "Reasoning", "layer": "J", "score": 0, "evidence": "The candidate shows no awareness of tradeoffs in any response. All answers focus only on positive aspects of their choices (choosing UI/UX, pursuing CS, working on data analytics) without acknowledging what was given up, alternative options considered, or any downsides to their decisions. No evidence of weighing pros and cons or understanding opportunity costs."}, {"code": "Jud", "name": "Judgment", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "Candidate mentions choices (UI/UX, computer science, entrepreneurship) but provides superficial reasoning like 'it's creative' or 'interesting' without demonstrating deep consideration of alternatives, trade-offs, or ownership of outcomes. No clear evidence of deliberate judgment or acceptance of consequences from decisions made."}, {"code": "Ins", "name": "Insight", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "The candidate provides mostly generic statements about liking design and creativity without demonstrating deeper understanding. While they mention some experiences (blood bank project, data analytics work), they fail to articulate meaningful insights or learning principles from these experiences. The responses lack reflection on what was actually learned or how experiences shaped their understanding."}, {"code": "Ref", "name": "Reflection", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "The candidate mentions some general areas for improvement (communication skills, aptitude) and states they are working on them, but provides no specific reflection on past experiences or concrete examples of how experiences led to behavioral changes. The responses lack depth and fail to demonstrate meaningful self-analysis or learning from specific situations."}, {"code": "Beyond", "name": "Goes Beyond", "category": "Reasoning", "layer": "J", "score": 1, "evidence": "Candidate provides some generic add-ons like mentioning entrepreneurship programs and skill improvement plans, but lacks depth, specific insights, or meaningful lessons. Answers are mostly surface-level descriptions without demonstrating learning from experiences or broader principles that would be memorable or valuable."}, {"code": "Adp", "name": "Adaptability", "category": "Conversation Behavior", "layer": "J", "score": 1, "evidence": "Candidate struggles significantly with adaptability. Responses show confusion about basic details (changing degree program, mixing languages mid-sentence), inability to provide coherent follow-up information, and difficulty staying on topic. When asked different questions, answers become increasingly disjointed rather than building clarity or addressing the specific direction of questions."}, {"code": "Ask", "name": "Clarifying", "category": "Conversation Behavior", "layer": "M+J", "score": 0, "evidence": "The candidate never asks any clarifying questions throughout the interview responses. They provide answers without seeking clarification on unclear prompts or questions, and some responses appear to address different questions than what may have been asked, suggesting they should have clarified but didn't."}, {"code": "B&F", "name": "Back/Forth", "category": "Conversation Behavior", "layer": "J", "score": 1, "evidence": "Candidate struggles to maintain coherent exchanges with frequent language switching, incomplete thoughts, and unclear responses that often don't directly address questions. While they attempt to respond to each prompt, the communication barriers require significant interviewer patience and likely frequent clarification requests to sustain the conversation."}, {"code": "Lis", "name": "Listening", "category": "Conversation Behavior", "layer": "J", "score": 1, "evidence": "Candidate frequently misunderstands or provides tangential responses. In Q1, misheard interviewer's name (Sara→Zara). Q4 asked about favorite part of degree but answered about external programs. Q6 asked what they would build with unlimited resources but answered about improving personal skills instead. Shows pattern of not fully processing the specific question being asked."}, {"code": "Ans", "name": "Responsive", "category": "Conversation Behavior", "layer": "J", "score": 1, "evidence": "Candidate consistently provides indirect, rambling responses that don't directly address the questions asked. Answers lack focus, contain significant language barriers, and often drift to unrelated topics (e.g., Q6 asks about building something with unlimited resources, but candidate discusses improving communication skills instead)."}, {"code": "Turn", "name": "Turn-Taking", "category": "Conversation Behavior", "layer": "M+J", "score": 4, "evidence": "Perfect turn-taking with zero overlapping segments and 0.0s overlap duration. Candidate waited for questions and responded appropriately without interrupting or over-talking, demonstrating respectful interview etiquette despite some language fluency challenges."}, {"code": "Rec", "name": "Recovery", "category": "Conversation Behavior", "layer": "D+J", "score": 1, "evidence": "Candidate shows minimal recovery ability. While they attempt to continue after language switches and stuttering (Answer 1), and try to clarify points when confused (Answer 2-3), the recovery is consistently slow and incomplete. They frequently repeat mistakes, struggle with language consistency throughout, and fail to regain smooth communication flow even after multiple attempts to self-correct."}, {"code": "Trust", "name": "Trust", "category": "Confidence Signals", "layer": "J", "score": 1, "evidence": "Significant inconsistencies undermine trustworthiness: claims to be pursuing B.Ed then Computer Science Engineering, switches between languages mid-sentence, provides vague or contradictory details about experience and projects. Communication issues and lack of coherent narrative make it difficult to verify claims or assess genuine competence."}, {"code": "Pres", "name": "Presence", "category": "Confidence Signals", "layer": "J", "score": 1, "evidence": "Candidate shows very hesitant communication with frequent grammatical errors, code-switching between English and Hindi mid-sentence, incomplete thoughts, and unclear explanations. While they demonstrate some technical knowledge and enthusiasm, the delivery lacks the clarity and confidence expected in professional settings."}, {"code": "Hold", "name": "Pressure Hold", "category": "Confidence Signals", "layer": "D+J", "score": 1, "evidence": "Candidate shows significant deterioration under pressure with frequent code-switching to native language, incomplete sentences, and increasingly fragmented responses. While basic meaning is sometimes conveyed on familiar topics like their background, communication breaks down substantially as questions progress, indicating poor pressure management."}, {"code": "Recv", "name": "Recovery Speed", "category": "Confidence Signals", "layer": "D", "score": 1, "evidence": "Candidate shows slow recovery with persistent issues. While they attempt to continue after disruptions like language switching (Answer 1) and unclear explanations, the recovery is incomplete. Answers remain structurally weak with ongoing grammar issues, unclear messaging, and lack of coherent flow throughout all responses."}, {"code": "Own", "name": "Ownership", "category": "Confidence Signals", "layer": "J", "score": 2, "evidence": "Shows some personal ownership with 'I' statements and mentions of personal projects (blood bank management system, data analytics work, entrepreneurship program), but lacks clear accountability for outcomes or specific impacts. Language is often vague and doesn't demonstrate deep ownership of results or learning from experiences."}, {"code": "Conf", "name": "Confidence", "category": "Confidence Signals", "layer": "C", "score": 1, "evidence": "Candidate shows low confidence with frequent speech breakdowns, code-switching between English and Hindi mid-sentence, repetitive stammering ('I am I am'), incomplete thoughts, and inconsistent self-presentation (claiming different educational backgrounds). While they attempt to engage with questions, the delivery suggests significant nervousness and lack of composure under interview pressure."}, {"code": "Nerv", "name": "Nervousness", "category": "Confidence Signals", "layer": "D+J", "score": 1, "evidence": "Frequent nervous signals including repetitive false starts ('I am I am design'), code-switching to native language mid-sentence, incomplete thoughts, and fragmented speech patterns throughout multiple answers indicate significant nervousness that impacts communication clarity."}, {"code": "Imp", "name": "Impact", "category": "Role Competency", "layer": "J", "score": 1, "evidence": "Candidate mentions some activities (blood bank management system project, 3-day entrepreneurship program, part-time data analytics work) but provides no quantified outcomes, measurable results, or clear impact from their actions. Claims are vague and lack specific details about achievements or meaningful contributions."}, {"code": "Lead", "name": "Leadership", "category": "Role Competency", "layer": "J", "score": 1, "evidence": "Candidate mentions starting a company and participating in entrepreneurship programs, but provides no concrete examples of leading others, taking initiative with measurable outcomes, or demonstrating actual leadership behaviors. Claims lack substance and supporting details."}, {"code": "Prof", "name": "Maturity", "category": "Role Competency", "layer": "J", "score": 1, "evidence": "Demonstrates immature professional judgment with inconsistent educational background claims, poor communication skills affecting professional presentation, code-switching between languages during interview, and vague or contradictory statements about experience and goals. Shows basic awareness of professional development needs but lacks the maturity to present coherently in a professional setting."}, {"code": "Prob", "name": "Problem Solve", "category": "Role Competency", "layer": "J", "score": 1, "evidence": "Candidate makes generic claims about choosing UI/UX and working on projects but provides no evidence of actual problem-solving processes, handling constraints, or overcoming specific challenges. Responses lack concrete examples of problem identification, analysis, or resolution steps."}, {"code": "Coll", "name": "Collab", "category": "Role Competency", "layer": "J", "score": 0, "evidence": "No collaboration evidence found. All answers focus on individual pursuits, personal interests, and solo activities. No mention of teamwork, group projects, working with others, or collaborative experiences."}, {"code": "Learn", "name": "Learnability", "category": "Role Competency", "layer": "J", "score": 2, "evidence": "Candidate shows basic learning examples like working with Power BI/SQL and attending entrepreneurship programs, and expresses desire to improve communication and aptitude skills with some structured approach (daily practice). However, lacks specific examples of learning from feedback or failure, and doesn't demonstrate how learning translated into systematic changes or measurable results."}, {"code": "Comp", "name": "Competency", "category": "Role Competency", "layer": "C", "score": 1, "evidence": "Candidate shows interest in UI/UX and mentions some relevant experience (blood bank management system project, Power BI/SQL), but communication issues significantly hinder demonstration of competencies. Answers lack clarity, structure, and depth. While there's basic understanding of the field and some technical exposure, the candidate cannot effectively articulate their skills or experiences in a way that demonstrates role-relevant behavior."}, {"code": "Dia", "name": "Diarization", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Speakers=2"}, {"code": "SNR", "name": "Signal-To-Noise Ratio", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "SNR=161.6dB"}, {"code": "Drop", "name": "Dropouts", "category": "Recording Quality", "layer": "M", "score": 0, "evidence": "Zero frames=2399"}, {"code": "Clip", "name": "Clipping", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Clip ratio=0.0000"}, {"code": "Mic", "name": "Mic Quality", "category": "Recording Quality", "layer": "M", "score": 3, "evidence": "RMS=0.0633"}, {"code": "Noi", "name": "Noise", "category": "Recording Quality", "layer": "M", "score": 4, "evidence": "Noise floor=0.0000"}]};
    const families = data.families;
    const signals = data.signals;
    const byCategory = signals.reduce((acc, s) => { (acc[s.category] ||= []).push(s); return acc; }, {});
    const avg = (items) => items.length ? items.reduce((sum, s) => sum + s.score, 0) / items.length : 0;
    const esc = (value) => String(value ?? "").replace(/[&<>"]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
    const fmt = (value, digits = 1) => value.toFixed(digits);
    const overall = avg(signals);
    document.getElementById("summary-bar").innerHTML = `
      <div class="summary-item"><span class="label">Overall</span><span class="value">${fmt(overall, 2)}/4</span><div class="bar"><div class="bar-fill" style="width:${overall / 4 * 100}%"></div></div></div>
      ${Object.entries(families).map(([cat, color]) => { const value = avg(byCategory[cat] || []); return `<div class="summary-item"><span class="label">${cat.split(' ')[0]}</span><span class="value">${fmt(value)}</span><div class="bar"><div class="bar-fill" style="width:${value / 4 * 100}%;background:${color}"></div></div></div>`; }).join('')}`;
    const table = document.getElementById("table");
    let count = 0;
    Object.entries(families).forEach(([family, color]) => {
      const group = document.createElement("div");
      group.className = "group";
      group.style.setProperty("--c", color);
      (byCategory[family] || []).forEach((s) => {
        count += 1;
        const tile = document.createElement("article");
        tile.className = "tile";
        tile.style.setProperty("--c", color);
        tile.innerHTML = `<div class="tile-fill s${s.score}"></div><div class="tile-header"><div class="layer">${esc(s.layer)}</div><div class="score-badge s${s.score}">${s.score}</div></div><div class="num">${String(count).padStart(2, "0")}</div><div class="sym">${esc(s.code)}</div><div class="name">${esc(s.name)}</div><div class="evidence" title="${esc(s.evidence)}">${esc(s.evidence)}</div>`;
        group.appendChild(tile);
      });
      const title = document.createElement("div");
      title.className = "group-title";
      title.textContent = family;
      group.appendChild(title);
      const avgEl = document.createElement("div");
      avgEl.className = "group-avg";
      avgEl.textContent = `avg ${fmt(avg(byCategory[family] || []))}`;
      group.appendChild(avgEl);
      table.appendChild(group);
    });
    document.getElementById("count").textContent = `v2 Scored · ${signals.length} elements`;
  </script>
